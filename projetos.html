<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Projetos — Velox by Invent v16</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23F5C300'/><text x='16' y='23' text-anchor='middle' font-size='18' font-weight='900' font-family='Inter,sans-serif' fill='%230a0e19'>VX</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#F5C300;--brand-dim:rgba(245,195,0,.15);
  --bg:#030610;--bg2:#100c2a;--surface:rgba(255,255,255,.065);
  --surface2:rgba(255,255,255,.1);--border:rgba(255,255,255,.12);
  --text:#f1f5f9;--muted:#64748b;--muted2:#94a3b8;
  --sidebar-w:240px;--sidebar-collapsed:60px;
  --radius:14px;--radius-sm:8px;
  --green:#22c55e;--blue:#3b82f6;--red:#ef4444;--amber:#f59e0b;
}
[data-theme="light"]{--bg:#f1f5f9;--bg2:#e2e8f0;--surface:rgba(255,255,255,.9);--surface2:rgba(255,255,255,.7);--border:rgba(0,0,0,.08);--text:#0f172a;--muted:#64748b;--muted2:#475569;}
html,body{height:100%;font-family:'Inter',sans-serif;background:radial-gradient(ellipse 120% 60% at 50% -5%,#1a1060 0%,#0a0520 35%,#030610 70%);color:var(--text);overflow:hidden}
[data-theme="light"] body{background:#f0f4f8!important}
button{cursor:pointer;border:none;background:none;font-family:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;z-index:10;overflow:hidden;}
#sidebar.collapsed{width:var(--sidebar-collapsed);min-width:var(--sidebar-collapsed)}
.sb-header{padding:20px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo{width:32px;height:32px;min-width:32px;background:linear-gradient(135deg,var(--brand),#d97706);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#0a0e19;letter-spacing:-0.5px;flex-shrink:0}
.sb-brand{overflow:hidden;opacity:1;transition:opacity .2s;line-height:1.2}
.sb-brand-name{font-size:15px;font-weight:900;letter-spacing:-1px;white-space:nowrap;color:var(--text)}
.sb-brand-name .vy{color:var(--brand)}.sb-brand-name .dot{color:var(--brand)}
.sb-brand-by{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
#sidebar.collapsed .sb-brand{opacity:0;width:0;overflow:hidden}
#sidebar-toggle{margin-left:auto;color:var(--muted);font-size:18px;padding:4px;border-radius:6px;flex-shrink:0}
#sidebar-toggle:hover{color:var(--text)}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px;border-radius:var(--radius-sm);color:var(--muted2);font-size:13px;font-weight:500;transition:all .2s;white-space:nowrap;overflow:hidden;}
.nav-item:hover{background:var(--surface2);color:var(--text)}.nav-item.active{background:var(--brand-dim);color:var(--brand)}
.nav-icon{font-size:18px;flex-shrink:0;width:20px;text-align:center}.nav-label{transition:opacity .2s}
#sidebar.collapsed .nav-label{opacity:0;width:0;overflow:hidden}
.sb-footer{padding:12px 8px;border-top:1px solid var(--border)}
#sidebar-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm)}
.su-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.su-info{overflow:hidden;flex:1}.su-nome{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.su-papel{font-size:10px;color:var(--muted);text-transform:capitalize}
.su-logout{padding:4px 6px;color:var(--muted);font-size:14px;border-radius:4px;transition:color .2s}.su-logout:hover{color:var(--red)}
#sidebar.collapsed .su-info{opacity:0;width:0;overflow:hidden}

/* Main */
#main{flex:1;overflow:auto;display:flex;flex-direction:column;min-width:0}
.topbar{padding:16px 28px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:5;}
.topbar-title{font-size:18px;font-weight:700;flex:1}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);color:var(--muted2);font-size:15px;transition:all .2s;}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-primary{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--brand);color:#0a0e19;font-size:13px;font-weight:700;border-radius:var(--radius-sm);transition:opacity .2s;}
.btn-primary:hover{opacity:.88}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--muted2);font-size:13px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;width:160px;}
.search-box input::placeholder{color:var(--muted)}

/* Filter bar */
.filter-bar{padding:14px 28px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--muted2);transition:all .2s;background:var(--surface);}
.filter-chip:hover{border-color:var(--brand);color:var(--brand)}.filter-chip.active{background:var(--brand-dim);border-color:var(--brand);color:var(--brand);font-weight:700}
.view-toggle{margin-left:auto;display:flex;gap:4px}
.view-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .2s;font-size:14px;border:1px solid transparent;}
.view-btn.active{background:var(--brand-dim);color:var(--brand);border-color:rgba(245,195,0,.3)}

/* List view */
.list-wrap{padding:24px 28px;display:flex;flex-direction:column;gap:8px}
.list-row{
  display:grid;grid-template-columns:1.8fr 100px 110px 90px 80px 80px 60px;
  align-items:center;gap:12px;padding:12px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  transition:all .2s;cursor:pointer;
}
.list-row:hover{border-color:var(--brand);background:var(--brand-dim)}
.list-row-nome{font-size:13px;font-weight:600}.list-row-sub{font-size:11px;color:var(--muted)}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.risco-dot{width:8px;height:8px;border-radius:50%}
.prog-bar{background:var(--border);border-radius:3px;height:4px;width:100%;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* Kanban view */
.kanban-wrap{padding:14px 18px;display:flex;gap:10px;overflow-x:auto;align-items:flex-start;min-height:calc(100vh - 160px)}
.kanban-col{
  flex:1 1 155px;min-width:155px;max-width:235px;
  background:linear-gradient(180deg,rgba(255,255,255,.042) 0%,rgba(255,255,255,.016) 100%);
  border:1px solid rgba(255,255,255,.09);
  border-radius:var(--radius);padding:0;overflow:hidden;
  backdrop-filter:blur(8px);
  box-shadow:0 4px 24px rgba(0,0,0,.18);
}
.kanban-col-header{
  padding:14px 16px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.07);
  position:relative;overflow:hidden;
}
/* Glowing left accent on column header */
.kanban-col-header::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:currentColor;opacity:.9;border-radius:0;
}
.kanban-count{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
  padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;
}
.kanban-cards{padding:8px;display:flex;flex-direction:column;gap:6px;max-height:calc(100vh - 260px);overflow-y:auto}
.kanban-card{
  background:linear-gradient(145deg,rgba(255,255,255,.06) 0%,rgba(255,255,255,.02) 100%);
  border:1px solid rgba(255,255,255,.09);
  border-top:3px solid transparent;
  border-radius:9px;padding:10px 11px;
  cursor:pointer;transition:all .22s ease;
  backdrop-filter:blur(6px);
}
.kanban-card:hover{
  border-color:rgba(245,195,0,.35);
  background:linear-gradient(145deg,rgba(245,195,0,.08) 0%,rgba(245,195,0,.03) 100%);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.kanban-card-nome{font-size:13px;font-weight:700;margin-bottom:4px}
.kanban-card-sub{font-size:11px;color:var(--muted)}
.kanban-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}

/* ── PROJECT HUB MODAL ── */
#hub-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;
}
#hub-overlay.open{display:flex}
#hub-modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:20px;
  width:100%;max-width:900px;max-height:90vh;display:flex;flex-direction:column;
  animation:hubIn .3s cubic-bezier(.4,0,.2,1);overflow:hidden;
}
@keyframes hubIn{from{opacity:0;transform:scale(.96) translateY(20px)}to{opacity:1;transform:none}}

#hub-header{
  padding:20px 24px 0;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:12px;flex-shrink:0;
}
.hub-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hub-title-block{}
.hub-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hub-subtitle{font-size:12px;color:var(--muted);margin-top:4px}
.hub-close{font-size:22px;color:var(--muted);padding:4px 8px;border-radius:8px;line-height:1;transition:color .2s}
.hub-close:hover{color:var(--text)}

.hub-tabs{display:flex;gap:0;margin-bottom:-1px}
.hub-tab{
  padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted2);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;
}
.hub-tab:hover{color:var(--text)}.hub-tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:700}

#hub-body{flex:1;overflow-y:auto;padding:24px}

/* Tab: Overview */
.hub-overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.hub-field-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.hub-field-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.hub-field-value{font-size:14px;font-weight:500}
.hub-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.hub-kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;text-align:center}
.hub-kpi-v{font-size:24px;font-weight:800;margin-bottom:2px}
.hub-kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}

/* Tab: Timeline */
.timeline-phases{display:flex;flex-direction:column;gap:12px}
.phase-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.phase-header{
  padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:background .2s;
}
.phase-header:hover{background:var(--surface2)}
.phase-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.phase-name{font-size:13px;font-weight:600;flex:1}
.phase-prog{font-size:11px;color:var(--muted)}
.phase-bar-wrap{height:3px;background:var(--border)}
.phase-bar-fill{height:100%;transition:width .6s ease}
.phase-ativs{padding:0 16px 12px;display:flex;flex-direction:column;gap:6px}
.hidden{display:none!important}
.ativ-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;background:var(--surface2)}
.ativ-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ativ-nome{font-size:12px;flex:1}
.ativ-edit-btn{font-size:11px;color:var(--brand);opacity:0;transition:opacity .2s;padding:2px 6px;border-radius:4px;background:var(--brand-dim)}
.ativ-row:hover .ativ-edit-btn{opacity:1}

/* Tab: Capa */
.capa-section{margin-bottom:20px}
.capa-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--brand);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.capa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.capa-field{background:var(--surface);border-radius:var(--radius-sm);padding:10px 14px}
.capa-field-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.capa-field-value{font-size:13px;font-weight:500}
.capa-list{display:flex;flex-direction:column;gap:6px}
.capa-list-item{background:var(--surface);border-radius:var(--radius-sm);padding:8px 14px;font-size:12px;display:flex;align-items:flex-start;gap:8px}
.capa-list-item::before{content:'•';color:var(--brand);font-weight:900;flex-shrink:0}
.no-capa{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.no-capa-icon{font-size:32px;margin-bottom:10px}

/* Tab: Mudanças de escopo */
.change-list{display:flex;flex-direction:column;gap:10px}
.change-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;position:relative}
.change-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.change-date{font-size:11px;color:var(--muted)}
.change-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.change-desc{font-size:13px;font-weight:500;margin-bottom:6px}
.change-meta{font-size:11px;color:var(--muted2)}
.change-impact{font-size:11px;background:rgba(245,195,0,.1);color:var(--brand);padding:4px 10px;border-radius:6px;margin-top:6px;display:inline-block}
.btn-add-change{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--brand-dim);color:var(--brand);font-size:12px;font-weight:600;border-radius:var(--radius-sm);border:1px solid rgba(245,195,0,.2);transition:all .2s;margin-top:12px}
.btn-add-change:hover{background:rgba(245,195,0,.25)}

/* Activity modal */
#ativ-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
#ativ-overlay.open{display:flex}
#ativ-modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;animation:hubIn .25s ease;overflow:hidden}
.ativ-modal-header{padding:20px 20px 0;border-bottom:1px solid var(--border);margin-bottom:0}
.ativ-modal-title{font-size:15px;font-weight:700;margin-bottom:4px}
.ativ-modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.ativ-modal-body{padding:16px 20px}

/* Shared */
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.chip{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.viewer-mode .edit-only{display:none!important}
#cmd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:9000;display:none;align-items:flex-start;justify-content:center;padding-top:15vh}
#cmd-overlay.open{display:flex}
#cmd-palette{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:520px;max-width:90vw;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)}
#cmd-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border)}
#cmd-icon{font-size:18px;color:var(--muted)}
#cmd-input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--text);font-family:'Inter',sans-serif}
#cmd-list{max-height:360px;overflow-y:auto;padding:8px}
.cmd-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--muted2);transition:all .15s}
.cmd-item:hover,.cmd-item.active{background:var(--brand-dim);color:var(--brand)}
.cmd-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.btn-print{display:flex;align-items:center;gap:7px;padding:8px 16px;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);border-radius:var(--radius-sm);font-size:12px;font-weight:700;color:#a78bfa;transition:all .2s}
.btn-print:hover{background:rgba(139,92,246,.22);border-color:#a78bfa}
.print-header{display:none}
/* ── Print / PDF mode ───────────────────────────────────── */
@media print{
  /* ① Forçar cores exatas (deve vir primeiro) */
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box!important}
  /* ② Reset global de layout (mantém tema atual) */
  html,body{
    overflow:visible!important;height:auto!important;min-height:0!important;
    font-size:12px!important;
  }
  /* ③ Esconder sidebar + todo o #main (topbar, filter-bar, view-container) */
  #sidebar,#main,
  .hub-tabs,.hub-top .btn-icon,.hub-close,#btn-duplicar,
  .edit-only,#ativ-overlay,#scope-overlay,#cmd-overlay,
  #hist-add-overlay,#urgency-banner,.btn-share,.btn-add-change{display:none!important}
  /* ④ Resetar app wrapper — sem flex, sem altura fixa */
  .app{display:block!important;height:auto!important;min-height:0!important;overflow:visible!important;padding:0!important;margin:0!important}
  /* ⑤ Hub overlay vira conteúdo de página (só quando aberto) */
  #hub-overlay:not(.open){display:none!important}
  #hub-overlay.open{
    position:static!important;display:block!important;
    background:none!important;padding:0!important;
    inset:auto!important;overflow:visible!important;
    height:auto!important;
  }
  #hub-modal{
    max-height:none!important;height:auto!important;
    border:1px solid var(--border)!important;border-radius:4px!important;
    animation:none!important;box-shadow:none!important;
    width:100%!important;max-width:100%!important;
    margin:0!important;
  }
  #hub-body{overflow:visible!important;max-height:none!important;padding:16px 20px!important}
  #hub-header{padding:16px 20px 0!important;border-bottom:2px solid var(--border)!important}
  /* ⑥ Tipografia */
  .hub-title{font-size:18px!important;font-weight:800!important}
  .hub-subtitle{font-size:11px!important}
  /* ⑦ Cards e campos */
  .hub-overview-grid,.hub-kpis,.phase-block,.change-item,.pendencia-item{break-inside:avoid!important}
  .hub-field-group{padding:10px 12px!important}
  .hub-field-label{font-size:10px!important}
  .hub-field-value{font-size:12px!important}
  .card,.change-item{break-inside:avoid!important}
  /* ⑧ Status pills */
  .status-pill{font-size:10px!important}
  /* ⑨ Barras coloridas — forçar visibilidade */
  .prog-fill{-webkit-print-color-adjust:exact!important;min-height:6px!important}
  .phase-bar-fill,.gantt-bar,.gantt-bar-fill{-webkit-print-color-adjust:exact!important}
  /* ⑩ Links */
  a{text-decoration:none!important}
  /* ⑪ Cabeçalho de impressão */
  .print-header{
    display:flex!important;justify-content:space-between;
    padding:8px 20px 12px;border-bottom:2px solid var(--border);
    font-size:10px;color:var(--muted);margin-bottom:4px;
  }
  /* ⑫ Quebras de página */
  .phase-block,.hub-kpi,.hub-field-group,.change-item{page-break-inside:avoid}
  /* ⑬ Margem de página */
  @page{margin:15mm 14mm;size:A4}
}

/* ── Histórico Timeline ── */
.hist-list{display:flex;flex-direction:column;gap:0;position:relative;padding-left:20px}
.hist-list::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border)}
.hist-event{position:relative;padding:0 0 20px 20px}
.hist-dot{position:absolute;left:-14px;top:4px;width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid var(--bg2)}
.hist-tipo-enviado   {background:#3b82f6}
.hist-tipo-recebido  {background:#22c55e}
.hist-tipo-interno   {background:#a855f7}
.hist-tipo-urgente   {background:#ef4444}
.hist-tipo-resolvido {background:#22c55e}
.hist-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:border-color .2s}
.hist-card:hover{border-color:rgba(255,255,255,.18)}
.hist-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.hist-data{font-size:10px;color:var(--muted);font-weight:600}
.hist-tipo-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:10px}
.hist-titulo{font-size:13px;font-weight:600;margin-bottom:5px;line-height:1.3}
.hist-corpo{font-size:12px;color:var(--muted2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hist-de{font-size:10px;color:var(--muted);margin-top:6px}
.hist-expand{font-size:11px;color:var(--brand);cursor:pointer;margin-top:4px;display:inline-block}
.hist-expand:hover{text-decoration:underline}
.hist-empty{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.hist-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.hist-filter-chip{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--muted2);transition:all .15s;background:var(--surface)}
.hist-filter-chip:hover{border-color:var(--brand);color:var(--brand)}
.hist-filter-chip.active{background:var(--brand-dim);border-color:var(--brand);color:var(--brand)}
</style>

<script src="utils.js"></script>
<script>
initTheme();
const user = checkAuth('projetos');
loadData();
initSidebar();
initPrintModal();
initCommandPalette();

// Persistir filtro e view entre navegações
let currentFiltro = localStorage.getItem('v16_projFiltro') || 'todos';
let currentView   = localStorage.getItem('v16_projView')   || 'kanban';
let currentProj   = null;
let currentTab    = 'overview';
let _kanbanCollapsed = {}; // { col_key: true/false }

function toggleKanbanCol(key){
  const cards = document.getElementById('kcards-'+key);
  if(!cards) return;
  _kanbanCollapsed[key] = !_kanbanCollapsed[key];
  cards.style.display = _kanbanCollapsed[key] ? 'none' : 'flex';
  const arrow = document.getElementById('karrow-'+key);
  if(arrow) arrow.textContent = _kanbanCollapsed[key] ? '▶' : '▼';
}

// Ler parâmetros da URL (sobrepõe o valor persistido se informado)
const params = new URLSearchParams(location.search);
if(params.get('filtro')) setFiltro(params.get('filtro'));
// Aplicar view persistida visualmente
document.getElementById('btn-list')?.classList.toggle('active', currentView==='list');
document.getElementById('btn-kanban')?.classList.toggle('active', currentView==='kanban');

function setFiltro(f, el){
  currentFiltro = f;
  localStorage.setItem('v16_projFiltro', f);
  document.querySelectorAll('.filter-chip').forEach(c => {
    const matches = c.getAttribute('onclick')?.includes(`'${f}'`) ?? false;
    c.classList.toggle('active', matches);
  });
  renderList();
}
function setView(v){
  currentView = v;
  localStorage.setItem('v16_projView', v);
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  document.getElementById('btn-kanban').classList.toggle('active', v==='kanban');
  renderList();
}

function getFiltered(){
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  return PROJETOS.filter(p => {
    const st = calcStatus(p);
    const matchQ = !q || p.nome.toLowerCase().includes(q) || p.local.toLowerCase().includes(q) || (p.pmo||'').toLowerCase().includes(q);
    if(!matchQ) return false;
    if(currentFiltro === 'todos')        return true;
    if(currentFiltro === 'em_andamento') return st === 'Em andamento';
    if(currentFiltro === 'atrasado')     return st === 'Atrasado';
    if(currentFiltro === 'critico')      return isCritico(p);
    if(currentFiltro === 'bloqueado')    return calcStatus(p)==='Bloqueado' || !!(p.bloqueador && p.bloqueador.trim());
    if(currentFiltro === 'concluido')    return st === 'Concluído';
    if(currentFiltro === 'nao_iniciado') return st === 'Não Iniciado';
    if(currentFiltro === 'standby')      return st === 'Standby';
    return true;
  });
}

function renderList(){
  const container = document.getElementById('view-container');
  const projects  = getFiltered();
  // Atualiza contador
  const cnt = document.getElementById('proj-count');
  if(cnt){
    const total = PROJETOS.length;
    cnt.textContent = projects.length === total ? `${total} projetos` : `${projects.length} de ${total}`;
  }
  if(currentView === 'kanban'){
    renderKanban(container, projects);
  } else {
    renderListView(container, projects);
  }
}

function renderListView(container, projects){
  if(!projects.length){
    container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">Nenhum projeto encontrado</div>';
    return;
  }
  const header = `
    <div style="display:grid;grid-template-columns:1.8fr 100px 110px 90px 80px 80px 60px;gap:12px;padding:4px 16px 8px;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px">
      ${['Projeto','Status','Progresso','Risco','PMO','Go Live','Dias'].map(x=>`<div>${x}</div>`).join('')}
    </div>`;
  const rows = projects.map(p => {
    const st   = calcStatus(p);
    const sm   = STATUS_MAP[st] || STATUS_MAP['Em andamento'];
    const r    = calcRisco(p);
    const rm   = RISCO_MAP[r];
    const prog = calcProgresso(p);
    const fe   = getFimEfetivo(p);
    const dias = fe ? Math.round((new Date(fe)-HOJE)/86400000) : null;
    const dc   = dias===null?'var(--muted)':dias<0?'#ef4444':dias<=30?'#f5c300':'var(--muted2)';
    const parado = calcDiasParadoAuto(p);
    return `<div class="list-row" onclick="openHub('${escHtml(p.nome)}')">
      <div><div class="list-row-nome">${p.nome}</div><div class="list-row-sub">${p.local} · ${p.pmo}</div></div>
      <span class="status-pill" style="background:${sm.bg};color:${sm.color}">${sm.icon} ${sm.label}</span>
      <div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%;background:${sm.color}"></div></div><div style="font-size:10px;color:var(--muted);margin-top:2px">${prog}%</div></div>
      <div style="display:flex;align-items:center;gap:5px"><div class="risco-dot" style="background:${rm.color}"></div><span style="font-size:11px;color:${rm.color}">${rm.label}</span></div>
      <div style="font-size:12px">${p.pmo}</div>
      <div style="font-size:11px;color:var(--muted)">${formatDate(fe||p.fim)}</div>
      <div style="font-size:11px;color:${dc}">${dias===null?'—':diasLabel(dias)}</div>
    </div>`;
  }).join('');
  container.innerHTML = `<div class="list-wrap">${header}${rows}</div>`;
}

function renderKanban(container, projects){
  // Pré-computa última comunicação por projeto
  const lastCommMap = {};
  projects.forEach(p => {
    const h = getHistoricoForProject(p.nome);
    if(h.length) lastCommMap[p.nome] = [...h].sort((a,b)=>(b.dataISO||'').localeCompare(a.dataISO||''))[0];
  });
  const cols = [
    {key:'nao_iniciado', label:'Não Iniciado', filter: p => calcStatus(p)==='Não Iniciado', color:'#94a3b8'},
    {key:'em_andamento', label:'Em Andamento',  filter: p => calcStatus(p)==='Em andamento', color:'#3b82f6'},
    {key:'bloqueado',    label:'Bloqueado',      filter: p => calcStatus(p)==='Bloqueado',    color:'#f97316'},
    {key:'atrasado',     label:'Atrasado',       filter: p => calcStatus(p)==='Atrasado',     color:'#ef4444'},
    {key:'standby',      label:'Standby',        filter: p => calcStatus(p)==='Standby',      color:'#64748b'},
    {key:'concluido',    label:'Concluído',       filter: p => calcStatus(p)==='Concluído',    color:'#22c55e'},
  ];
  const html = cols.map(col => {
    const ps = projects.filter(col.filter);
    const cards = ps.map(p => {
      const r   = calcRisco(p);
      const rm  = RISCO_MAP[r];
      const prog = calcProgresso(p);
      const fe  = getFimEfetivo(p);
      const dp  = calcDiasParadoAuto(p);
      // Days-to-deadline
      const dias = fe ? Math.round((new Date(fe) - HOJE) / 86400000) : null;
      const diasColor = dias===null ? 'var(--muted)' : dias < 0 ? '#ef4444' : dias <= 14 ? '#f97316' : dias <= 30 ? '#f5c300' : '#22c55e';
      const diasLabelTxt = dias===null ? '' : dias < 0 ? `${Math.abs(dias)}d atrasado` : dias === 0 ? 'Hoje!' : `${dias}d restantes`;
      // Progress color
      const progColor = prog >= 70 ? '#22c55e' : prog >= 35 ? '#3b82f6' : col.color;
      // Bloqueador snippet
      const bloqSnippet = p.bloqueador
        ? `<div style="font-size:10px;color:#f97316;margin-top:6px;padding:4px 8px;background:rgba(249,115,22,.1);border-radius:5px;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">🔒 ${escHtml(p.bloqueador.split(';')[0])}</div>`
        : '';
      // Dias parado warning
      const paradoSnippet = dp >= 7
        ? `<span style="font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;background:${dp>=15?'rgba(239,68,68,.12)':'rgba(245,158,11,.12)'};color:${dp>=15?'#ef4444':'#f59e0b'}">⏸ ${dp}d parado</span>`
        : '';
      // Critical glow
      const critGlow = isCritico(p) ? 'box-shadow:0 0 0 1px rgba(239,68,68,.35),0 4px 16px rgba(239,68,68,.15);' : '';
      return `<div class="kanban-card" style="border-top-color:${col.color};${critGlow}" onclick="openHub('${escHtml(p.nome)}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px;margin-bottom:3px">
          <div class="kanban-card-nome" style="flex:1;font-size:12px;line-height:1.3">${p.nome}</div>
          <div style="font-size:16px;font-weight:900;letter-spacing:-1px;color:${progColor};flex-shrink:0;line-height:1">${prog}<span style="font-size:8px;font-weight:600;color:var(--muted)">%</span></div>
        </div>
        <div class="prog-bar" style="height:4px;margin-bottom:7px"><div class="prog-fill" style="width:${prog}%;background:${progColor}"></div></div>
        ${bloqSnippet}
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px;margin-top:6px">
          <span style="font-size:9px;font-weight:700;color:${rm.color};background:${rm.color}1a;padding:1px 6px;border-radius:8px">${rm.dot} ${rm.label}</span>
          ${paradoSnippet ? `<span style="font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700;background:${dp>=15?'rgba(239,68,68,.12)':'rgba(245,158,11,.12)'};color:${dp>=15?'#ef4444':'#f59e0b'}">⏸${dp}d</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding-top:6px;border-top:1px solid rgba(255,255,255,.07)">
          <span style="font-size:9px;color:var(--muted)">👤 ${(p.pmo||'—').split(' ')[0]}</span>
          ${diasLabelTxt ? `<span style="font-size:9px;font-weight:700;color:${diasColor}">${diasLabelTxt}</span>` : fe ? `<span style="font-size:9px;color:var(--muted2)">${formatDateShort(fe)}</span>` : ''}
        </div>
        ${(()=>{
          const lc = lastCommMap[p.nome];
          if(!lc) return '';
          const rel = formatRelativeDate(lc.dataISO);
          return `<div style="margin-top:5px;padding-top:5px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:4px" title="${escHtml(lc.titulo||'')}">
            <span style="font-size:9px;color:#475569">📡</span>
            <span style="font-size:9px;color:#475569;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(lc.titulo||'—')}</span>
            <span style="font-size:9px;color:#334155;flex-shrink:0">${rel}</span>
          </div>`;
        })()}
      </div>`;
    }).join('') || '<div style="text-align:center;padding:20px;color:var(--muted);font-size:11px">—</div>';
    const collapsed = !!_kanbanCollapsed[col.key];
    return `<div class="kanban-col">
      <div class="kanban-col-header" style="color:${col.color};cursor:pointer;user-select:none" onclick="toggleKanbanCol('${col.key}')" title="${collapsed?'Expandir':'Recolher'} coluna">
        <span>${col.label}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="kanban-count">${ps.length}</span>
          <span id="karrow-${col.key}" style="font-size:10px;color:var(--muted);transition:transform .2s">${collapsed?'▶':'▼'}</span>
        </div>
      </div>
      <div id="kcards-${col.key}" class="kanban-cards" style="${collapsed?'display:none':''}">
        ${cards}
      </div>
    </div>`;
  }).join('');
  container.innerHTML = `<div class="kanban-wrap">${html}</div>`;
}

// ── Project Hub ────────────────────────────────────────────
function openHub(nome){
  currentProj = PROJETOS.find(p => p.nome === nome);
  if(!currentProj) return;
  _histFilter = 'todos';
  _ativSearch = ''; // limpa filtro ao trocar de projeto
  document.getElementById('hub-overlay').classList.add('open');
  document.getElementById('hub-title').textContent = currentProj.nome;
  document.getElementById('hub-subtitle').textContent = `${currentProj.local} · PMO: ${currentProj.pmo} · Coordenador: ${currentProj.resp||'—'}`;
  // Preencher cabeçalho de impressão
  const ph = document.getElementById('print-proj-name');
  const pd = document.getElementById('print-date');
  if(ph) ph.textContent = `${currentProj.nome} · ${currentProj.local}`;

}

// URL ?p= → abre hub (tratado no bloco único ao final do script)

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.hub-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  const body = document.getElementById('hub-body');
  if(tab==='overview')   renderHubOverview(body);
  if(tab==='timeline')   renderHubTimeline(body);
  if(tab==='activities') renderHubActivities(body);
  if(tab==='historico')  renderHubHistorico();
  if(tab==='capa')       renderHubCapa(body);
  if(tab==='changes')    renderHubChanges(body);
}

function renderHubTimeline(el){
  const p = currentProj;
  const ativs = ATIVIDADES.filter(a=>a.projeto===p.nome);
  const phaseColors = ['#a855f7','#3b82f6','#06b6d4','#10b981','#f59e0b','#ef4444','#22c55e'];
  const html = FASES.map((fase,fi) => {
    const fa   = ativs.filter(a=>a.fase===fase);
    const done = fa.filter(a=>a.status==='Concluído').length;
    const prog = fa.length ? Math.round(done/fa.length*100) : 0;
    const color = phaseColors[fi] || '#64748b';
    const ativRows = fa.map(a => {
      const asm = STATUS_MAP[a.status]||STATUS_MAP['Em andamento'];
      return `<div class="ativ-row">
        <div class="ativ-status-dot" style="background:${asm.color}"></div>
        <div class="ativ-nome">${escHtml(a.nome)}</div>
        <span style="font-size:12px;color:${asm.color}">${asm.icon}</span>
        ${!isViewer()?`<button class="ativ-edit-btn edit-only" onclick="openAtivEdit('${escHtml(p.nome)}','${escHtml(fase)}','${escHtml(a.nome)}');event.stopPropagation()">Editar</button>`:''}
      </div>`;
    }).join('')||'<div style="font-size:12px;color:var(--muted);padding:6px">Sem atividades cadastradas</div>';
    // 100% done phases start collapsed; phases with no activities are hidden
    const startCollapsed = prog === 100;
    const isEmpty = !fa.length;
    return `<div class="phase-block" ${isEmpty?'style="opacity:.45"':''}>
      <div class="phase-header" onclick="this.nextElementSibling.classList.toggle('hidden');this.nextElementSibling.nextElementSibling.classList.toggle('hidden');this.querySelector('.ph-chevron').style.transform=this.nextElementSibling.classList.contains('hidden')?'rotate(0deg)':'rotate(90deg)'">
        <div class="phase-icon" style="background:${prog===100?color+'30':color+'20'};color:${prog===100?'#22c55e':color}">${prog===100?'✓':fi+1}</div>
        <div class="phase-name" style="color:${prog===100?'var(--muted)':'var(--text)'}">${fase.split('. ')[1]||fase}</div>
        <div class="phase-prog" style="color:${prog===100?'#22c55e':prog>0?color:'var(--muted)'}">${prog}%</div>
        <span class="ph-chevron" style="font-size:14px;color:var(--muted);transition:transform .2s;transform:rotate(${startCollapsed?0:90}deg)">›</span>
      </div>
      <div class="phase-bar-wrap ${startCollapsed?'hidden':''}"><div class="phase-bar-fill" style="width:${prog}%;background:${color}"></div></div>
      <div class="phase-ativs ${startCollapsed?'hidden':''}">${ativRows}</div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="timeline-phases">${html}</div>`;
}

const HIST_TIPO = {
  enviado:  {icon:'📤', label:'Enviado',       color:'#3b82f6', bg:'rgba(59,130,246,.12)'},
  recebido: {icon:'📥', label:'Recebido',       color:'#22c55e', bg:'rgba(34,197,94,.12)'},
  interno:  {icon:'🔁', label:'Interno',        color:'#a855f7', bg:'rgba(168,85,247,.12)'},
  urgente:  {icon:'🚨', label:'Alta Prioridade',color:'#ef4444', bg:'rgba(239,68,68,.12)'},
  resolvido:{icon:'✅', label:'Resolvido',       color:'#22c55e', bg:'rgba(34,197,94,.12)'},
};

let _histFilter = 'todos';
function renderHubHistorico(el) {
  const pane = el || document.getElementById('hub-body');
  if (!pane) return;
  const hist = getHistoricoForProject(currentProj.nome);
  const canEdit = !isViewer();
  const TIPO_COLORS = {
    enviado:   {bg:'rgba(59,130,246,.15)',  color:'#3b82f6',  label:'Enviado'},
    recebido:  {bg:'rgba(34,197,94,.15)',   color:'#22c55e',  label:'Recebido'},
    interno:   {bg:'rgba(168,85,247,.15)',  color:'#a855f7',  label:'Interno'},
    urgente:   {bg:'rgba(239,68,68,.15)',   color:'#ef4444',  label:'Alta Prioridade'},
    resolvido: {bg:'rgba(34,197,94,.15)',   color:'#22c55e',  label:'Resolvido'},
  };
  const tipos = ['todos', ...Object.keys(TIPO_COLORS)];
  const filtered = (_histFilter === 'todos' ? hist : hist.filter(e => e.tipo === _histFilter))
    .slice().sort((a,b) => (b.dataISO||'').localeCompare(a.dataISO||''));
  const filtersHtml = tipos.map(t => {
    const label = t === 'todos' ? 'Todos' : (TIPO_COLORS[t]?.label || t);
    const cnt = t === 'todos' ? hist.length : hist.filter(e => e.tipo === t).length;
    return `<span class="hist-filter-chip ${_histFilter===t?'active':''}" onclick="_histFilter='${t}';renderHubHistorico(document.getElementById('hub-body'))">${label} <span style="opacity:.6">${cnt}</span></span>`;
  }).join('');

  const addBtn = canEdit ? `<button onclick="__openAddHistorico()" style="font-size:12px;font-weight:600;background:var(--brand);color:#0a0e19;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;margin-left:auto">+ Registrar</button>` : '';
  const filterRow = `<div class="hist-filter-row" style="align-items:center">${filtersHtml}${addBtn}</div>`;

  if (!hist.length) {
    pane.innerHTML = filterRow + `<div class="hist-empty"><div style="font-size:32px;margin-bottom:10px">📡</div>Nenhum histórico registrado para este projeto.</div>`;
    return;
  }

  const eventsHtml = filtered.map((ev, idx) => {
    const tc = TIPO_COLORS[ev.tipo] || {bg:'rgba(100,116,139,.15)', color:'#64748b', label: ev.tipo};
    const simBadge = ev._flagSimilar
      ? `<span title="Conteúdo similar à entrada anterior${ev._simDias!=null?' (há '+ev._simDias+' dia'+(ev._simDias===1?'':'s')+')':''}" style="background:rgba(249,115,22,.18);color:#fb923c;border:1px solid rgba(249,115,22,.35);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.04em">🔄 Repetido</span>`
      : '';
    return `<div class="hist-event">
      <div class="hist-dot hist-tipo-${ev.tipo || 'interno'}"></div>
      <div class="hist-card">
        <div class="hist-meta" style="flex-wrap:wrap;gap:5px">
          <span class="hist-data">${escHtml(ev.dataLabel || ev.dataISO || '—')}</span>
          <span class="hist-tipo-badge" style="background:${tc.bg};color:${tc.color}">${tc.label}</span>
          ${simBadge}
        </div>
        <div class="hist-titulo">${escHtml(ev.titulo || '—')}</div>
        <div class="hist-corpo" id="hist-corpo-${idx}">${escHtml(ev.corpo || '')}</div>
        ${ev.corpo && ev.corpo.length > 180 ? `<span class="hist-expand" onclick="document.getElementById('hist-corpo-${idx}').style['-webkit-line-clamp']='unset';this.style.display='none'">Ler mais</span>` : ''}
        ${ev.de ? `<div class="hist-de">De: ${escHtml(ev.de)}${ev.para?' → '+escHtml(ev.para):''}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  // Banner de similaridade — aparece enquanto a entrada mais recente for repetida
  const latestEntry = [...hist].sort((a,b)=>(b.dataISO||'').localeCompare(a.dataISO||''))[0];
  const simBanner = latestEntry?._flagSimilar ? `
    <div style="display:flex;align-items:flex-start;gap:10px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);border-radius:10px;padding:12px 14px;margin-bottom:14px">
      <span style="font-size:18px;flex-shrink:0">🔄</span>
      <div>
        <div style="font-size:13px;font-weight:700;color:#fbbf24;margin-bottom:2px">Conteúdo similar detectado</div>
        <div style="font-size:12px;color:#94a3b8">A última entrada é similar à anterior${latestEntry._simDias!=null?' (há '+latestEntry._simDias+' dia'+(latestEntry._simDias===1?'':'s')+')':''} — sem evolução registrada no projeto.</div>
      </div>
    </div>` : '';

  pane.innerHTML = simBanner + filterRow +
    (filtered.length === 0
      ? `<div class="hist-empty">Nenhum evento do tipo "${escHtml(_histFilter)}".</div>`
      : `<div class="hist-list">${eventsHtml}</div>`);
}

      <div style="display:flex;justify-content:flex-end;gap:8px">
        <button onclick="document.getElementById('hist-add-overlay').remove()"
          style="padding:8px 18px;border-radius:8px;font-size:13px;background:var(--surface2);border:1px solid var(--border);color:var(--muted2);cursor:pointer">Cancelar</button>
        <button onclick="__salvarHistoricoEntry()"
          style="padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;color:#0a0e19;background:var(--brand);border:none;cursor:pointer">Salvar Registro</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

// _calcSimilarity e _diasEntre definidos em utils.js

function __salvarHistoricoEntry(){
  const titulo = document.getElementById('ha-titulo')?.value.trim();
  if(!titulo){ toast('⚠ Título é obrigatório.','warn'); return; }
  const dataVal = document.getElementById('ha-data')?.value || HOJE_ISO;
  const corpo = document.getElementById('ha-corpo')?.value.trim() || '';
  const evento = {
    dataISO:   dataVal,
    dataLabel: dataVal.split('-').reverse().join('/'),
    tipo:      document.getElementById('ha-tipo')?.value || 'enviado',
    de:        document.getElementById('ha-de')?.value.trim() || '',
    para:      document.getElementById('ha-para')?.value.trim() || '',
    titulo,
    corpo,
  };

  // ── Similarity check against previous entry ──
  const prevHist = getHistoricoForProject(currentProj.nome);
  const prevSorted = [...prevHist].sort((a,b)=>(b.dataISO||'').localeCompare(a.dataISO||''));
  const prevEntry = prevSorted[0];
  if(prevEntry){
    const newText  = titulo + ' ' + corpo;
    const prevText = (prevEntry.titulo||'') + ' ' + (prevEntry.corpo||'');
    const sim = _calcSimilarity(newText, prevText);
    if(sim >= 0.38){
      const dias = _diasEntre(prevEntry.dataISO, dataVal);
      const diasTxt = dias !== null ? `há ${dias} dia${dias===1?'':'s'}` : 'recentemente';
      evento._flagSimilar = true;
      evento._simDias = dias;
    }
  }

  saveHistoricoEvent(currentProj.nome, evento);
  document.getElementById('hist-add-overlay')?.remove();
  renderHubHistorico();
  if(evento._flagSimilar){
    const dias = evento._simDias;
    const diasTxt = dias !== null ? `há ${dias} dia${dias===1?'':'s'}` : 'recentemente';
    // Toast com z-index alto
    const tt = document.createElement('div');
    tt.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:99999;
      background:#1e293b;border-left:4px solid #f5c300;color:#f1f5f9;
      padding:13px 18px;border-radius:8px;font-size:13px;font-weight:500;
      box-shadow:0 8px 28px rgba(0,0,0,.6);max-width:340px;animation:slideInRight .25s ease`;
    tt.textContent = `🔄 Conteúdo similar à anterior (${diasTxt}) — sem evolução detectada`;
    document.body.appendChild(tt);
    setTimeout(()=>tt.remove(), 8000);
  } else {
    toast('✓ Registro salvo no histórico.','success');
  }
}

function renderHubActivities(el){

      </div>

  // No results
  if(!ativs.length){

          // "Alterado hoje" badge
          const lastComm = (a.comentarios||[]).slice(-1)[0];
          const isHoje = lastComm && lastComm.dataISO === HOJE_ISO;
          const hasComments = (a.comentarios||[]).length > 0;

  if(_ativSearch){

  }

  saveAltEscopoOverrides(currentProj.nome, alt);

  toast(`Mudança de escopo: ${novoStatus}`, novoStatus==='Aprovado'?'success':novoStatus==='Recusado'?'warn':'info');
}

function setAtivStatus(s, autoSave=false){
  if(!currentAtiv || isViewer()) return;
  currentAtiv.status = s;
  if(autoSave){ saveData(); if(currentProj) switchTab(currentTab); renderList(); }
  openAtivEdit(currentAtiv.projeto, currentAtiv.fase, currentAtiv.nome);
}
function closeAtivModal(){ document.getElementById('ativ-overlay').classList.remove('open'); }
function saveAtiv(){
  if(!currentAtiv) return;
  // Salvar responsável
  const respInput = document.getElementById('ativ-resp-input');
  if(respInput) currentAtiv.resp = respInput.value.trim();
  // Salvar comentário
  const txt = document.getElementById('new-comment')?.value.trim();
  if(txt){
    if(!currentAtiv.comentarios) currentAtiv.comentarios = [];
    const u = getCurrentUser();
    currentAtiv.comentarios.push({texto:txt, autor:u?.nome||'Anônimo', dataISO:HOJE_ISO, status:currentAtiv.status});
  }
  saveData(); closeAtivModal();
  if(currentProj) switchTab(currentTab);
  renderList();
  toast('Atividade salva!','success');
}

  const el = document.getElementById('scope-overlay');

  document.getElementById('sc-desc').value = '';
  document.getElementById('sc-impacto').value = '';
  document.getElementById('sc-status').value = 'Pendente';

  const el = document.getElementById('scope-overlay');

function salvarNovaAlt(){
  const descricao = document.getElementById('sc-desc').value.trim();
  if(!descricao){ toast('Descrição obrigatória.','warn'); return; }
  const impacto = document.getElementById('sc-impacto').value.trim();
  const status  = document.getElementById('sc-status').value;

function __copiarLink(){
  if(!currentProj) return;
  const url = `${location.origin}${location.pathname}?p=${encodeURIComponent(currentProj.nome)}`;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>toast('🔗 Link copiado para a área de transferência!','success',3000));
  } else {
    // fallback
    const el = document.createElement('textarea');
    el.value = url; el.style.position='fixed'; el.style.opacity='0';
    document.body.appendChild(el); el.select(); document.execCommand('copy');
    document.body.removeChild(el);
    toast('🔗 Link copiado!','success',3000);
  }
}

// ── Duplicar Projeto ──────────────────────────────────────
function __duplicarProj(){
  if(!currentProj) return;
  if(!confirm(`Duplicar "${currentProj.nome}"?\n\nUma cópia com todas as atividades zeradas (Não Iniciado) será criada.`)) return;
  const copia = duplicarProjeto(currentProj.nome);
  if(copia){
    closeHub();
    renderList();
    toast(`✓ Projeto duplicado: ${copia.nome}`, 'success', 3500);
    setTimeout(()=>openHub(copia.nome), 250);
  }
}

// escHtml defined in utils.js — available globally (XSS-safe escaping)

// ── ESC key to close overlays ─────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    // Fechar modal de novo registro histórico
    const histAdd = document.getElementById('hist-add-overlay');
    if(histAdd){ histAdd.remove(); return; }
    const scopeEl = document.getElementById('scope-overlay');
    if(scopeEl && scopeEl.style.display==='flex'){ closeScopeModal(); return; }
    if(document.getElementById('ativ-overlay')?.classList.contains('open')){ closeAtivModal(); return; }
    if(document.getElementById('hub-overlay')?.classList.contains('open')){ closeHub(); return; }
  }
});

renderList();
updateAlertBadge();

// Abrir projeto via URL
if(params.get('p')){ setTimeout(()=>openHub(decodeURIComponent(params.get('p'))),50); }
</script>
